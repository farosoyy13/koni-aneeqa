openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: أناقة CHIC - متجر الفساتين الراقية (نظام التحكم المطلق)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dresses
  - name: reviews
  - name: contact
  - name: orders
  - name: listings
  - name: admin
    description: (غرفة العمليات) صلاحيات صاحب الموقع الحصرية

paths:
  /healthz:
    get: {operationId: healthCheck, tags: [health], summary: Health check}

  /dresses:
    get: {operationId: listDresses, tags: [dresses], summary: List all dresses}

  /dresses/featured:
    get: {operationId: getFeaturedDresses, tags: [dresses], summary: Get featured}

  /dresses/{id}:
    get: {operationId: getDress, tags: [dresses], summary: Get dress}

  /listings:
    get: {operationId: listListings, tags: [listings], summary: List listings}
    post: {operationId: createListing, tags: [listings], summary: Create listing}

  /reviews:
    get: {operationId: listReviews, tags: [reviews], summary: List reviews}
    post: {operationId: createReview, tags: [reviews], summary: Create review}

  /contact:
    post: {operationId: submitContact, tags: [contact], summary: Contact form}

  /orders:
    post: {operationId: createOrder, tags: [orders], summary: Checkout}

  # --- مسارات التحكم المطلق (غرفة العمليات) ---
  /admin/dashboard:
    get: {operationId: getFullControlDashboard, tags: [admin], summary: استعراض شامل لكل بيانات الموقع}
  
  /admin/messages/private-audit:
    get: {operationId: auditPrivateMessages, tags: [admin], summary: (سري) مراقبة الرسائل الخاصة}
    
  /admin/audit-logs:
    get: {operationId: getAuditLogs, tags: [admin], summary: سجل الرقابة لكل تحركات المشرفين}

  /admin/staff:
    get: {operationId: listStaff, tags: [admin], summary: إدارة صلاحيات المشرفين}
    post: {operationId: assignRole, tags: [admin], summary: تعيين صلاحيات}

  /admin/listings/{id}:
    put: {operationId: updateListing, tags: [admin], summary: تعديل إعلان}
    delete: {operationId: deleteListing, tags: [admin], summary: حذف إعلان}

components:
  schemas:
    HealthStatus: {type: object, properties: {status: {type: string}}}
    Dress: {type: object, required: [id, name, nameAr, price], properties: {id: {type: integer}, name: {type: string}, nameAr: {type: string}, price: {type: number}}}
    Listing: {type: object, required: [id, title], properties: {id: {type: integer}, title: {type: string}}}
    ListingInput: {type: object, required: [title], properties: {title: {type: string}}}
    Review: {type: object, required: [id], properties: {id: {type: integer}}}
    ReviewInput: {type: object, required: [comment], properties: {comment: {type: string}}}
    ContactInput: {type: object, required: [name], properties: {name: {type: string}}}
    ContactResponse: {type: object, properties: {success: {type: boolean}}}
    OrderItem: {type: object, required: [dressId], properties: {dressId: {type: integer}}}
    OrderInput: {type: object, required: [items], properties: {items: {type: array, items: {$ref: "#/components/schemas/OrderItem"}}}}
    Order: {type: object, required: [id], properties: {id: {type: integer}}}
